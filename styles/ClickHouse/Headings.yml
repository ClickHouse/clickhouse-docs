extends: capitalization
message: "'%s' should use sentence-style capitalization."
link: "https://developers.google.com/style/capitalization#capitalization-in-titles-and-headings"
level: error
scope: heading
match: $sentence
indicators:
  - ":"
exceptions:
  - "^[a-z]+[A-Z][a-zA-Z]*$"  # Matches camelCase pattern (e.g., getMacro, runningDifference)
  - "^[A-Z]+$"                # Matches words that are entirely uppercase (e.g., API, SQL)
  - "^[A-Z][a-zA-Z]*[A-Z][a-zA-Z]*$"  # Matches PascalCase (e.g., MergeTree, ReplacingMergeTree)
  - "^[a-z].*\\..*$"          # Matches dotted identifiers (e.g., system.errors, jemalloc.active)
  - "^[A-Z][a-zA-Z]*[A-Z][a-zA-Z]*_.*$"  # Matches system metrics with underscores
  - "^[a-z][a-z_]*[a-z]$"  # Matches configuration parameter names with underscores
