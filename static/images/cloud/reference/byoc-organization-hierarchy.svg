<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/>
    </filter>
    <linearGradient id="orgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="acctGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f4fd"/>
      <stop offset="100%" stop-color="#d6ecfa"/>
    </linearGradient>
    <linearGradient id="regionGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e1"/>
      <stop offset="100%" stop-color="#ffecb3"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8f5e9"/>
      <stop offset="100%" stop-color="#c8e6c9"/>
    </linearGradient>
    <linearGradient id="svcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="#ffffff" rx="8"/>

  <!-- ===== LAYER: Organizations ===== -->
  <!-- Cloud Org -->
  <rect x="100" y="30" width="240" height="56" rx="10" fill="url(#orgGrad)" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="220" y="63" text-anchor="middle" font-size="14" font-weight="600" fill="#424242">ClickHouse Cloud Org</text>

  <!-- BYOC Org -->
  <rect x="540" y="30" width="280" height="56" rx="10" fill="url(#orgGrad)" stroke="#bdbdbd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="680" y="63" text-anchor="middle" font-size="14" font-weight="600" fill="#424242">ClickHouse BYOC Org</text>

  <!-- Users -->
  <g transform="translate(395, 22)">
    <circle cx="20" cy="10" r="8" fill="none" stroke="#757575" stroke-width="1.2"/>
    <path d="M8 30 Q20 20 32 30" fill="none" stroke="#757575" stroke-width="1.2"/>
    <text x="20" y="44" text-anchor="middle" font-size="10" fill="#757575">Users</text>
  </g>

  <!-- Org connection lines -->
  <line x1="340" y1="58" x2="395" y2="58" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="435" y1="58" x2="540" y2="58" stroke="#bdbdbd" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ===== Connector from BYOC Org down ===== -->
  <line x1="680" y1="86" x2="680" y2="120" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- Branch lines to accounts -->
  <line x1="680" y1="120" x2="200" y2="120" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="680" y1="120" x2="800" y2="120" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="200" y1="120" x2="200" y2="145" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="500" y1="120" x2="500" y2="145" stroke="#90a4ae" stroke-width="1.5"/>
  <line x1="800" y1="120" x2="800" y2="145" stroke="#90a4ae" stroke-width="1.5"/>

  <!-- ===== LAYER: Cloud Accounts ===== -->
  <rect x="100" y="145" width="200" height="50" rx="8" fill="url(#acctGrad)" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="200" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">AWS Account 1</text>
  <text x="200" y="184" text-anchor="middle" font-size="10" fill="#1976d2">123456789012</text>

  <rect x="400" y="145" width="200" height="50" rx="8" fill="url(#acctGrad)" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="500" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">AWS Account 2</text>
  <text x="500" y="184" text-anchor="middle" font-size="10" fill="#1976d2">987654321098</text>

  <rect x="700" y="145" width="200" height="50" rx="8" fill="url(#acctGrad)" stroke="#64b5f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="168" text-anchor="middle" font-size="13" font-weight="600" fill="#1565c0">GCP Project 1</text>
  <text x="800" y="184" text-anchor="middle" font-size="10" fill="#1976d2">my-gcp-project</text>

  <!-- ===== Connectors: Accounts -> Regions ===== -->
  <line x1="160" y1="195" x2="160" y2="235" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="260" y1="195" x2="260" y2="235" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="500" y1="195" x2="500" y2="235" stroke="#90a4ae" stroke-width="1.2"/>
  <line x1="800" y1="195" x2="800" y2="235" stroke="#90a4ae" stroke-width="1.2"/>

  <!-- ===== LAYER: Regions ===== -->
  <rect x="95" y="235" width="130" height="40" rx="6" fill="url(#regionGrad)" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="160" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#e65100">us-east-1</text>

  <rect x="195" y="235" width="130" height="40" rx="6" fill="url(#regionGrad)" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="260" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#e65100">us-west-2</text>

  <rect x="435" y="235" width="130" height="40" rx="6" fill="url(#regionGrad)" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="500" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#e65100">us-west-2</text>

  <rect x="735" y="235" width="130" height="40" rx="6" fill="url(#regionGrad)" stroke="#ffa726" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="800" y="260" text-anchor="middle" font-size="12" font-weight="500" fill="#e65100">europe-west1</text>

  <!-- ===== Connectors: Regions -> Infra ===== -->

  <!-- ===== LAYER: BYOC Infrastructure ===== -->
  <!-- Infra 1 (us-east-1) -->
  <rect x="60" y="315" width="200" height="185" rx="8" fill="url(#infraGrad)" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="160" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">BYOC Infra 1</text>
  <line x1="80" y1="348" x2="240" y2="348" stroke="#a5d6a7" stroke-width="0.8"/>
  <!-- Infra contents label -->
  <text x="80" y="366" font-size="10" fill="#558b2f">VPC  |  K8s Cluster  |  S3 Buckets</text>
  <!-- Services inside infra 1 -->
  <rect x="80" y="380" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="160" y="401" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 1</text>
  <rect x="80" y="420" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="160" y="441" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 2</text>
  <rect x="80" y="460" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="160" y="481" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 3</text>

  <!-- Infra 2 (us-west-2 in Acct 1) -->
  <rect x="290" y="315" width="200" height="145" rx="8" fill="url(#infraGrad)" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="390" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">BYOC Infra 2</text>
  <line x1="310" y1="348" x2="470" y2="348" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="310" y="366" font-size="10" fill="#558b2f">VPC  |  K8s Cluster  |  S3 Buckets</text>
  <rect x="310" y="380" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="390" y="401" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 4</text>
  <rect x="310" y="420" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="390" y="441" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 5</text>

  <!-- Infra 3 (us-west-2 in Acct 2) -->
  <rect x="520" y="315" width="200" height="115" rx="8" fill="url(#infraGrad)" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="620" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">BYOC Infra 3</text>
  <line x1="540" y1="348" x2="700" y2="348" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="540" y="366" font-size="10" fill="#558b2f">VPC  |  K8s Cluster  |  S3 Buckets</text>
  <rect x="540" y="380" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="620" y="401" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 6</text>

  <!-- Infra 4 (GCP) -->
  <rect x="750" y="315" width="200" height="115" rx="8" fill="url(#infraGrad)" stroke="#66bb6a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="850" y="338" text-anchor="middle" font-size="13" font-weight="600" fill="#2e7d32">BYOC Infra 4</text>
  <line x1="770" y1="348" x2="930" y2="348" stroke="#a5d6a7" stroke-width="0.8"/>
  <text x="770" y="366" font-size="10" fill="#558b2f">VPC  |  GKE Cluster  |  GCS Buckets</text>
  <rect x="770" y="380" width="160" height="32" rx="5" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="850" y="401" text-anchor="middle" font-size="11" fill="#424242">ClickHouse Service 7</text>

  <!-- ===== Connectors: Regions -> Infra ===== -->
  <!-- us-east-1 -> Infra 1 (straight down) -->
  <line x1="160" y1="275" x2="160" y2="315" stroke="#90a4ae" stroke-width="1.2"/>
  <!-- us-west-2 (Acct 1) -> Infra 2 -->
  <path d="M260 275 L260 295 L390 295 L390 315" fill="none" stroke="#90a4ae" stroke-width="1.2"/>
  <!-- us-west-2 (Acct 2) -> Infra 3 -->
  <path d="M500 275 L500 295 L620 295 L620 315" fill="none" stroke="#90a4ae" stroke-width="1.2"/>
  <!-- europe-west1 -> Infra 4 -->
  <path d="M800 275 L800 295 L850 295 L850 315" fill="none" stroke="#90a4ae" stroke-width="1.2"/>

  <!-- ===== Legend ===== -->
  <rect x="60" y="540" width="880" height="50" rx="6" fill="#fafafa" stroke="#e0e0e0" stroke-width="1"/>
  <rect x="80" y="553" width="16" height="16" rx="3" fill="url(#acctGrad)" stroke="#64b5f6" stroke-width="1"/>
  <text x="102" y="566" font-size="11" fill="#616161">Cloud Account / Project</text>
  <rect x="260" y="553" width="16" height="16" rx="3" fill="url(#regionGrad)" stroke="#ffa726" stroke-width="1"/>
  <text x="282" y="566" font-size="11" fill="#616161">Region</text>
  <rect x="370" y="553" width="16" height="16" rx="3" fill="url(#infraGrad)" stroke="#66bb6a" stroke-width="1"/>
  <text x="392" y="566" font-size="11" fill="#616161">BYOC Infrastructure</text>
  <rect x="560" y="553" width="16" height="16" rx="3" fill="url(#svcGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="582" y="566" font-size="11" fill="#616161">ClickHouse Service</text>
  <rect x="740" y="553" width="16" height="16" rx="3" fill="url(#orgGrad)" stroke="#bdbdbd" stroke-width="1"/>
  <text x="762" y="566" font-size="11" fill="#616161">Organization</text>
</svg>